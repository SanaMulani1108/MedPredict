{% extends "base.html" %}
{% block content %}
<style>
.auth-wrapper {
  min-height: calc(100vh - 160px);
  display: flex; align-items: center; justify-content: center; padding: 20px 0;
}
.auth-card {
  background: #fff; border-radius: 24px;
  box-shadow: 0 8px 48px rgba(15,76,129,0.14);
  padding: 48px 44px; width: 100%; max-width: 460px;
  border: 1px solid var(--border);
}
.auth-logo { text-align: center; margin-bottom: 32px; }
.auth-logo .icon { font-size: 2.8rem; margin-bottom: 10px; }
.auth-logo h2 { font-family: 'Sora', sans-serif; font-weight: 700; color: var(--primary); font-size: 1.6rem; }
.auth-logo p { color: var(--text-muted); font-size: 0.9rem; margin: 0; }
.form-label { font-weight: 600; font-size: 0.88rem; color: var(--text); margin-bottom: 6px; }
.input-icon-wrap { position: relative; }
.input-icon-wrap .bi { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1rem; }
.input-icon-wrap .form-control { padding-left: 40px; }
.btn-auth {
  width: 100%; padding: 13px; border-radius: 12px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border: none; color: #fff; font-weight: 700; font-size: 1rem;
  transition: all 0.2s; margin-top: 8px;
}
.btn-auth:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(15,76,129,0.3); color: #fff; }
.auth-footer { text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-muted); }
.auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
.divider { text-align: center; margin: 20px 0; color: var(--text-muted); font-size: 0.85rem; position: relative; }
.divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--border); }
.divider::before { left: 0; } .divider::after { right: 0; }
</style>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🔐</div>
      <h2>Welcome Back</h2>
      <p>Sign in to your MedPredict account</p>
    </div>
    <form method="POST" action="/login">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-icon-wrap">
          <i class="bi bi-envelope"></i>
          <input type="email" class="form-control" name="email" placeholder="you@example.com" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" class="form-control" name="password" placeholder="Your password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-auth">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="/signup">Create one free →</a>
    </div>
  </div>
</div>
{% endblock %}
