{% extends "base.html" %}
{% block content %}
<style>
.contact-hero { background:linear-gradient(135deg,#0b3d6b,#1565c0); border-radius:20px; padding:48px; color:#fff; text-align:center; margin-bottom:32px; }
.contact-hero h1 { font-family:'Sora',sans-serif; font-weight:700; font-size:2rem; margin-bottom:8px; }
.contact-hero p { opacity:0.85; font-size:1rem; margin:0; }
.contact-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:20px; }
.contact-card { background:#fff; border-radius:18px; padding:32px; border:1px solid #e2e8f0; box-shadow:0 2px 12px rgba(15,76,129,0.07); text-align:center; transition:all 0.2s; }
.contact-card:hover { transform:translateY(-3px); box-shadow:0 8px 28px rgba(15,76,129,0.12); }
.contact-card .ci { font-size:2.5rem; margin-bottom:14px; }
.contact-card h5 { font-family:'Sora',sans-serif; font-weight:700; color:#0f4c81; margin-bottom:8px; }
.contact-card p { color:#64748b; font-size:0.95rem; margin:0; word-break:break-all; }
</style>

<div class="contact-hero">
  <h1>Contact Us</h1>
  <p>Have questions, feedback, or want to collaborate? Reach out anytime.</p>
  <p>Visit us at <a href="https://www.medpredict.com" target="_blank" style="color: #90caf9;">  www.medpredict.com</a></p>
</div>

<div class="contact-grid">
  <div class="contact-card">
    <div class="ci">📞</div>
    <h5>Phone</h5>
    <p>0000000000</p>
  </div>
  <div class="contact-card">
    <div class="ci">📧</div>
    <h5>Email</h5>
    <p>abc@gmail.com</p>
  </div>
  <div class="contact-card">
    <div class="ci">🕐</div>
    <h5>Response Time</h5>
    <p>Usually within 24–48 hours</p>
  </div>
</div>
{% endblock %}
